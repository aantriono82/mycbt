name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        default: latest
      build_backend:
        description: 'Build and push backend image'
        type: boolean
        required: true
        default: true
      build_frontend:
        description: 'Build and push frontend image'
        type: boolean
        required: true
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ inputs.image_tag || 'latest' }}
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/atigacbt-backend
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/atigacbt-frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Backend
        if: ${{ github.event_name == 'push' || inputs.build_backend }}
        run: docker build -t $BACKEND_IMAGE:$IMAGE_TAG -f docker/backend.Dockerfile .

      - name: Build Frontend
        if: ${{ github.event_name == 'push' || inputs.build_frontend }}
        run: docker build -t $FRONTEND_IMAGE:$IMAGE_TAG -f docker/frontend.Dockerfile .

      - name: Push Backend
        if: ${{ github.event_name == 'push' || inputs.build_backend }}
        run: docker push $BACKEND_IMAGE:$IMAGE_TAG

      - name: Push Frontend
        if: ${{ github.event_name == 'push' || inputs.build_frontend }}
        run: docker push $FRONTEND_IMAGE:$IMAGE_TAG
