name: Build and Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag override (contoh: v1.2.3). Kosongkan untuk auto git-<shortsha>'
        required: false
        default: ''
      build_backend:
        description: 'Build and push backend image'
        type: boolean
        required: true
        default: true
      build_frontend:
        description: 'Build and push frontend image'
        type: boolean
        required: true
        default: true

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_frontend == true) }}
    env:
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mycbt-frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve image tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            PRIMARY_TAG="${{ inputs.image_tag }}"
          else
            PRIMARY_TAG="git-${SHORT_SHA}"
          fi
          echo "PRIMARY_TAG=${PRIMARY_TAG}" >> "$GITHUB_ENV"

      - name: Build and Push Frontend
        run: |
          docker build -t $FRONTEND_IMAGE:$PRIMARY_TAG -t $FRONTEND_IMAGE:latest -f docker/frontend.Dockerfile .
          docker push $FRONTEND_IMAGE:$PRIMARY_TAG
          docker push $FRONTEND_IMAGE:latest

  build-backend:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_backend == true) }}
    env:
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mycbt-backend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Resolve image tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            PRIMARY_TAG="${{ inputs.image_tag }}"
          else
            PRIMARY_TAG="git-${SHORT_SHA}"
          fi
          echo "PRIMARY_TAG=${PRIMARY_TAG}" >> "$GITHUB_ENV"

      - name: Build and Push Backend
        run: |
          docker build -t $BACKEND_IMAGE:$PRIMARY_TAG -t $BACKEND_IMAGE:latest -f docker/backend.Dockerfile .
          docker push $BACKEND_IMAGE:$PRIMARY_TAG
          docker push $BACKEND_IMAGE:latest

  trigger-deploy:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: ${{ always() && (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') && (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') }}
    steps:
      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
          DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}
        if: env.DOKPLOY_URL != '' && env.DOKPLOY_API_KEY != '' && env.DOKPLOY_APPLICATION_ID != ''
        run: |
          curl -fsS -X POST "${DOKPLOY_URL}/api/application.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_KEY}" \
            -d "{\"applicationId\":\"${DOKPLOY_APPLICATION_ID}\"}"

      - name: Deployment Summary
        run: |
          echo "### Deployment Status"
          if [ -n "${{ secrets.DOKPLOY_URL }}" ]; then
            echo "✅ Dokploy deploy trigger sent."
          else
            echo "⚠️ Dokploy trigger skipped: Secrets not configured."
          fi


