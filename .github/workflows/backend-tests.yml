name: Backend Tests

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-tests.yml"
      - ".gitignore"
      - "Makefile"
      - "scripts/test-backend.sh"
      - "README.md"
      - "backend/**"
  pull_request:
    paths:
      - ".github/workflows/backend-tests.yml"
      - ".gitignore"
      - "Makefile"
      - "scripts/test-backend.sh"
      - "README.md"
      - "backend/**"
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Unit and Handler Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: |
            backend/go.sum
            backend/go.test.sum

      - name: Run backend test suite
        run: make test-backend

  test-backend-integration:
    name: PostgreSQL Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: atigacbt_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d atigacbt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/atigacbt_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: |
            backend/go.sum
            backend/go.test.sum

      - name: Run PostgreSQL integration tests
        run: make test-backend-integration
