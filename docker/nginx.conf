server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Frontend container should be able to start without depending on
    # a specific internal backend hostname in container networking.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
