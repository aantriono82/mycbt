<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo 8 Kartu Peserta</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }
      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid #cbd5e1;
        background: #ffffff;
      }
      .btn {
        border: 0;
        border-radius: 10px;
        padding: 9px 14px;
        font-weight: 700;
        cursor: pointer;
        color: #fff;
        background: #4338ca;
      }
      .btn.secondary {
        background: #0f172a;
      }
      .page {
        width: 210mm;
        min-height: 297mm;
        margin: 10px auto;
        padding: 6mm;
        background: #fff;
      }
      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 2.2mm;
      }
      .card {
        border: 2px solid #111;
        height: 66mm;
        overflow: hidden;
        break-inside: avoid;
      }
      .header {
        display: grid;
        grid-template-columns: 19mm 1fr;
        border-bottom: 1px solid #111;
        min-height: 19mm;
      }
      .logo {
        border-right: 1px solid #111;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
      }
      .logo img {
        width: 14mm;
        height: 14mm;
        object-fit: contain;
      }
      .head-text {
        text-align: center;
        padding: 1.5mm 2mm;
      }
      .head-text .line {
        line-height: 1.12;
      }
      .head-text .line.bold {
        font-size: 9px;
        font-weight: 700;
      }
      .head-text .line.school {
        font-size: 12px;
        font-weight: 700;
        margin-top: 0.6mm;
      }
      .head-text .line.exam {
        font-size: 10px;
        font-weight: 700;
        margin-top: 0.6mm;
      }
      .head-text .line.year {
        font-size: 9px;
        font-weight: 700;
        margin-top: 0.6mm;
      }
      .identity {
        padding: 1.2mm 2mm 1mm;
        display: grid;
        gap: 0.4mm;
      }
      .row {
        display: grid;
        grid-template-columns: 16mm 3mm 1fr;
        align-items: baseline;
      }
      .row .label,
      .row .colon,
      .row .value {
        font-size: 8px;
      }
      .row .value.bold {
        font-weight: 700;
      }
      .bottom {
        display: grid;
        grid-template-columns: 2fr 1.2fr 2.6fr;
        min-height: 21mm;
      }
      .no-peserta {
        border-right: 1px solid #111;
        text-align: center;
        padding: 1.1mm 1mm;
      }
      .no-peserta .title {
        font-size: 9px;
        font-weight: 700;
        text-decoration: underline;
        margin-bottom: 0.6mm;
      }
      .no-peserta .number {
        font-size: 12px;
        font-weight: 700;
      }
      .photo {
        border-right: 1px solid #111;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1mm;
      }
      .photo-box {
        width: 13mm;
        height: 17mm;
        border: 1px solid #111;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-size: 7px;
      }
      .sign {
        padding: 1.1mm 1.4mm;
        font-size: 7px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        line-height: 1.2;
      }
      .sign .space {
        min-height: 5.5mm;
      }
      .sign .name {
        font-weight: 700;
        text-decoration: underline;
        font-size: 8px;
      }
      .sign .nip {
        font-size: 7px;
      }
      @media print {
        @page {
          size: A4 portrait;
          margin: 6mm;
        }
        body {
          background: #fff;
        }
        .toolbar {
          display: none;
        }
        .page {
          margin: 0;
          padding: 0;
          width: auto;
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <button class="btn" onclick="window.print()">Cetak / Simpan PDF</button>
      <button class="btn secondary" onclick="downloadHtml()">Download HTML</button>
      <span>Demo 8 kartu peserta per halaman A4</span>
    </div>
    <main class="page">
      <div class="cards" id="cards"></div>
    </main>
    <script>
      const peserta = [
        ['Andi Pratama', 'VII A', '03-207-191-1'],
        ['Budi Santoso', 'VII A', '03-207-191-2'],
        ['Citra Lestari', 'VII B', '03-207-191-3'],
        ['Dewi Anggraini', 'VII B', '03-207-191-4'],
        ['Eko Saputra', 'VII C', '03-207-191-5'],
        ['Fitri Ramadhani', 'VII C', '03-207-191-6'],
        ['Galih Prabowo', 'VII D', '03-207-191-7'],
        ['Hani Purnama', 'VII D', '03-207-191-8'],
      ]

      const cards = document.getElementById('cards')
      cards.innerHTML = peserta
        .map(
          ([nama, kelas, no]) => `
          <section class="card">
            <div class="header">
              <div class="logo">LOGO</div>
              <div class="head-text">
                <div class="line bold">PEMERINTAH KABUPATEN LAMPUNG TENGAH</div>
                <div class="line bold">DINAS PENDIDIKAN DAN KEBUDAYAAN</div>
                <div class="line school">UPTD SMPN 2 BANGUNREJO</div>
                <div class="line exam">ASESMEN SUMATIF AKHIR SEMESTER</div>
                <div class="line year">TAHUN PELAJARAN 2026/2027</div>
              </div>
            </div>
            <div class="identity">
              <div class="row"><div class="label">Nama</div><div class="colon">:</div><div class="value bold">${nama}</div></div>
              <div class="row"><div class="label">Kelas</div><div class="colon">:</div><div class="value">${kelas}</div></div>
              <div class="row"><div class="label">Semester</div><div class="colon">:</div><div class="value">Ganjil</div></div>
            </div>
            <div class="bottom">
              <div class="no-peserta">
                <div class="title">Nomor Peserta</div>
                <div class="number">${no}</div>
              </div>
              <div class="photo"><div class="photo-box">FOTO<br/>PESERTA</div></div>
              <div class="sign">
                <div>Bangunrejo, 27 April 2026</div>
                <div>Kepala Sekolah,</div>
                <div class="space"></div>
                <div class="name">AAN TRIONO</div>
                <div class="nip">NIP 197610012007012022</div>
              </div>
            </div>
          </section>
        `,
        )
        .join('')

      function downloadHtml() {
        const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html;charset=utf-8' })
        const a = document.createElement('a')
        a.href = URL.createObjectURL(blob)
        a.download = 'demo-kartu-8.html'
        a.click()
        URL.revokeObjectURL(a.href)
      }
    </script>
  </body>
</html>
